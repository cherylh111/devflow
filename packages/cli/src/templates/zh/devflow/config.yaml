#     - "echo 'Task started'"
#   after_finish:
#     - "echo 'Task finished'"
#   after_archive:
#     - "echo 'Task archived'"

#-------------------------------------------------------------------------------
# Monorepo / Packages
#-------------------------------------------------------------------------------

# packages:
#   frontend:
#     path: packages/frontend
#   backend:
#     path: packages/backend
#
# default_package: frontend

channel:
  worker_guard:
    idle_timeout: 5m
    max_live_workers: 6

